<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: '#0D0D0D',
                        card: '#1A1A1A',
                        borderDark: '#2D2D2D',
                        primary: '#E53E3E',
                        primaryLight: '#FC8181',
                        primaryLighter: '#FEB2B2',
                        primaryDark: '#4A1A1A'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background-color: #0D0D0D; color: #ffffff; }
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center selection:bg-primaryLight selection:text-white">
    <div class="w-full max-w-3xl flex flex-col gap-6">

        <!-- Header -->
        <div class="flex justify-between items-center bg-card border border-borderDark px-5 py-4 rounded-xl shadow-lg">
            <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white flex items-center gap-3">
                <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                IoT Smart Home
            </h1>
            <div id="conn-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-primaryDark/50 border border-primaryDark text-sm font-medium text-primaryLight transition-colors opacity-70">
                <span class="text-[0.6rem]">●</span> DISCONNECTED
            </div>
        </div>

        <!-- Sensor Card -->
        <div id="sensor-card" class="bg-card border border-borderDark rounded-xl p-6 transition-colors shadow-lg">
            <div class="flex flex-col md:flex-row justify-between md:items-center gap-4">
                <div>
                    <h2 class="text-gray-400 font-medium mb-1">Status Sensor Eksternal</h2>
                    <div id="last-update" class="text-xs text-gray-500">Diperbarui: --:--:--</div>
                </div>
                <div class="flex gap-6">
                    <!-- Suhu -->
                    <div class="flex items-center gap-3">
                        <div class="p-3 bg-primary/10 text-primary rounded-full">
                            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 7v5"/></svg>
                        </div>
                        <div>
                            <div class="text-2xl font-bold text-white"><span id="temp-val">--</span>°C</div>
                            <div class="text-xs font-medium tracking-wide text-gray-500 uppercase mt-0.5">Suhu</div>
                        </div>
                    </div>
                    <div class="w-px bg-borderDark"></div>
                    <!-- Kelembaban -->
                    <div class="flex items-center gap-3">
                        <div class="p-3 bg-blue-500/10 text-blue-500 rounded-full">
                            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                        </div>
                        <div>
                            <div class="text-2xl font-bold text-white"><span id="hum-val">--</span>%</div>
                            <div class="text-xs font-medium tracking-wide text-gray-500 uppercase mt-0.5">Kelembaban</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Warning banner -->
            <div id="temp-warning" class="hidden mt-4 bg-primary/20 border border-primary/50 text-white px-4 py-3 rounded-lg text-sm flex items-center gap-3">
                <svg class="w-5 h-5 text-primary flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                Peringatan: Suhu lingkungan mencapai batas kritis (≥ 35°C)!
            </div>
        </div>

        <!-- Relays Grid -->
        <h2 class="text-gray-400 font-medium -mb-2 px-1">Kontrol Relay</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="relays-container">
            <!-- Injected by JS -->
        </div>

        <!-- Global Controls -->
        <div class="flex gap-4 mt-2" id="global-controls">
            <button onclick="setAll(true)" class="flex-1 bg-card border border-borderDark hover:bg-borderDark text-white transition-colors py-3.5 rounded-xl font-medium shadow-sm">Semua ON</button>
            <button onclick="setAll(false)" class="flex-1 border border-primary/30 hover:bg-primary/10 text-primary transition-colors py-3.5 rounded-xl font-medium shadow-sm">Semua OFF</button>
        </div>

        <!-- Variasi Lampu -->
        <h2 class="text-gray-400 font-medium mt-2 px-1">Variasi Lampu</h2>
        <div class="flex flex-col sm:flex-row gap-4" id="variasi-container">
            <button onclick="setVariasi(1)" id="btn-var-1" class="flex-1 border border-borderDark text-white bg-card hover:bg-borderDark transition-colors py-3 rounded-xl font-medium shadow-sm">▶ Variasi 1</button>
            <button onclick="setVariasi(2)" id="btn-var-2" class="flex-1 border border-borderDark text-white bg-card hover:bg-borderDark transition-colors py-3 rounded-xl font-medium shadow-sm">▶ Variasi 2</button>
            <button onclick="setVariasi(0)" id="btn-var-0" class="flex-1 border border-borderDark text-gray-400 bg-card hover:bg-borderDark/80 transition-colors py-3 rounded-xl font-medium shadow-sm">⏹ Stop</button>
        </div>
    </div>

    <script>
        // Konfigurasi MQTT
        const config = {
            broker: 'wss://broker.hivemq.com:8884/mqtt',
            topics: {
                status: 'iot/rumah/relay/status',
                command: 'iot/rumah/relay/command',
                allCommand: 'iot/rumah/relay/allcommand',
                sensor: 'iot/rumah/sensor/data',
                variasiStatus: 'iot/rumah/variasi/status',
                variasiCommand: 'iot/rumah/variasi/command'
            }
        };

        // State Manager
        const state = {
            connected: false,
            sensor: { t: '--', h: '--', ts: null },
            relays: { 1: false, 2: false, 3: false, 4: false },
            pending: { 1: false, 2: false, 3: false, 4: false },
            variasi: 0
        };

        // Buat Client ID Random
        const clientId = 'web_client_' + Math.random().toString(16).substr(2, 8);
        const client = mqtt.connect(config.broker, { 
            clientId: clientId, 
            reconnectPeriod: 3000 // Auto-reconnect jika putus
        });

        // Event: Berhasil Connect
        client.on('connect', () => {
            state.connected = true;
            updateBadge();
            // Subscribe ke topic (status dan config retained)
            client.subscribe([config.topics.status, config.topics.sensor, config.topics.variasiStatus], (err) => {
                if (err) console.error("Subscribe Error:", err);
            });
        });

        // Event: Disconnect / Reconnecting
        client.on('close', () => {
            state.connected = false;
            updateBadge();
            renderRelays();
        });

        // Event: Menerima Pesan MQTT
        client.on('message', (topic, message) => {
            try {
                const payload = JSON.parse(message.toString());
                
                if (topic === config.topics.status) {
                    for (let i = 1; i <= 4; i++) {
                        const key = `relay${i}`;
                        if (payload[key] !== undefined) {
                            state.relays[i] = payload[key] === true || String(payload[key]) === 'true';
                            state.pending[i] = false; // Matikan mode loading jika data diterima
                        }
                    }
                    renderRelays();
                } 
                else if (topic === config.topics.sensor) {
                    if (payload.suhu !== undefined) state.sensor.t = parseFloat(payload.suhu);
                    if (payload.kelembaban !== undefined) state.sensor.h = parseFloat(payload.kelembaban);
                    
                    const now = new Date();
                    state.sensor.ts = now.toLocaleTimeString('id-ID', { hour12: false });
                    updateSensorInfo();
                }
                else if (topic === config.topics.variasiStatus) {
                    if (payload.variasi !== undefined) {
                        state.variasi = parseInt(payload.variasi);
                        renderRelays();
                        renderVariasi();
                    }
                }
            } catch (e) {
                console.error('Failed to parse MQTT message payload', e);
            }
        });

        // Fungsi Action Toggle
        function toggleRelay(id) {
            if (!state.connected || state.pending[id] || state.variasi > 0) return;
            
            state.pending[id] = true;
            const targetState = !state.relays[id];
            
            // Kirim perintah
            const commandPayload = { relay: id, state: targetState };
            client.publish(config.topics.command, JSON.stringify(commandPayload));
            
            renderRelays();

            // Fallback timeout (hapus loading jika alat tidak merespon dalam 5 detik)
            setTimeout(() => {
                if (state.pending[id]) {
                    state.pending[id] = false;
                    renderRelays();
                    console.warn(`Timeout waiting for relay ${id} confirmation`);
                }
            }, 5000);
        }

        // Fungsi Global Control
        function setAll(targetState) {
            if (!state.connected || state.variasi > 0) return;

            client.publish(config.topics.allCommand, JSON.stringify({ state: targetState }));

            for (let i = 1; i <= 4; i++) {
                if (state.relays[i] !== targetState) {
                    state.pending[i] = true;
                }
            }
            renderRelays();
            
            // Fallback timeout
            setTimeout(() => {
                for(let i = 1; i <= 4; i++) state.pending[i] = false;
                renderRelays();
            }, 5000);
        }

        function setVariasi(v) {
            if (!state.connected) return;
            client.publish(config.topics.variasiCommand, JSON.stringify({ variasi: v }));
        }

        // --- Render UI Functions --- //

        function updateBadge() {
            const badge = document.getElementById('conn-badge');
            if (state.connected) {
                badge.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-500/10 border border-green-500/30 text-sm font-medium text-green-500 transition-colors shadow-[0_0_10px_rgba(34,197,94,0.1)]';
                badge.innerHTML = '<span class="text-[0.6rem] animate-pulse">●</span> CONNECTED';
            } else {
                badge.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-primaryDark/40 border border-primaryDark text-sm font-medium text-primaryLight transition-colors opacity-75';
                badge.innerHTML = '<span class="text-[0.6rem]">●</span> DISCONNECTED';
            }
        }

        function updateSensorInfo() {
            if (state.sensor.t !== '--') {
                document.getElementById('temp-val').innerText = state.sensor.t;
                const w = document.getElementById('temp-warning');
                if (state.sensor.t >= 35) {
                    w.classList.remove('hidden');
                } else {
                    w.classList.add('hidden');
                }
            }
            if (state.sensor.h !== '--') {
                document.getElementById('hum-val').innerText = state.sensor.h;
            }
            if (state.sensor.ts) {
                document.getElementById('last-update').innerText = 'Diperbarui: ' + state.sensor.ts;
            }
        }

        function renderRelays() {
            const container = document.getElementById('relays-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= 4; i++) {
                const isOn = state.relays[i];
                const isPending = state.pending[i];

                // Indikator Warna
                const indColor = isOn 
                    ? 'bg-primary shadow-[0_0_12px_rgba(229,62,62,0.8)]' 
                    : 'bg-primaryDark';

                // Class Kartu
                const cardClass = isOn
                    ? 'bg-card border-primary/40 shadow-[0_4px_20px_rgba(229,62,62,0.05)]'
                    : 'bg-card border-borderDark';

                // Status Tombol
                let btnClass = '';
                let btnText = '';

                let isDisabled = !state.connected || isPending || state.variasi > 0;

                if (isDisabled) {
                    btnClass = 'bg-borderDark/40 text-gray-500 cursor-not-allowed';
                    btnText = isPending 
                        ? `<svg class="spinner w-5 h-5 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`
                        : (isOn ? 'Matikan' : 'Nyalakan');
                } else {
                    btnClass = isOn
                        ? 'bg-primary/10 text-primary border border-primary/20 hover:bg-primary/20'
                        : 'bg-borderDark hover:bg-borderDark/80 text-white';
                    btnText = isOn ? 'Matikan' : 'Nyalakan';
                }

                // Append Card HTML
                const card = document.createElement('div');
                card.className = `border rounded-xl p-5 flex flex-col justify-between items-center transition-all duration-300 ${cardClass}`;
                card.innerHTML = `
                    <div class="flex justify-between w-full mb-6 items-center">
                        <div class="font-semibold text-gray-300">Lampu ${i}</div>
                        <div class="flex items-center gap-2.5">
                            <div class="text-[0.7rem] font-bold tracking-wider text-gray-500">${isOn ? 'MENYALA' : 'MATI'}</div>
                            <div class="w-3 h-3 rounded-full transition-all duration-300 ${indColor}"></div>
                        </div>
                    </div>
                    <button
                        onclick="toggleRelay(${i})"
                        ${isDisabled ? 'disabled' : ''}
                        class="w-full py-3 rounded-lg font-medium transition-all duration-200 ${btnClass}">
                        ${btnText}
                    </button>
                `;
                container.appendChild(card);
            }
        }

        function renderVariasi() {
            const btn1 = document.getElementById('btn-var-1');
            const btn2 = document.getElementById('btn-var-2');
            const glbControls = document.getElementById('global-controls');
            
            const defClass = "flex-1 border text-white transition-colors py-3 rounded-xl font-medium shadow-sm border-borderDark bg-card hover:bg-borderDark";
            const actClass = "flex-1 border transition-colors py-3 rounded-xl font-medium shadow-sm bg-primary/20 border-primary/50 text-white shadow-[0_0_15px_rgba(229,62,62,0.15)]";
            
            if (!btn1 || !btn2) return;

            if (state.variasi === 1) {
                btn1.className = actClass;
                btn2.className = defClass;
            } else if (state.variasi === 2) {
                btn1.className = defClass;
                btn2.className = actClass;
            } else {
                btn1.className = defClass;
                btn2.className = defClass;
            }

            if (glbControls) {
                if (state.variasi > 0) {
                    glbControls.classList.add('opacity-50', 'pointer-events-none');
                } else {
                    glbControls.classList.remove('opacity-50', 'pointer-events-none');
                }
            }
        }

        // Init UI saat pertama kali load
        updateBadge();
        renderRelays();
        renderVariasi();
    </script>
</body>
</html>
